version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: derrumbe_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-derrumbes}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USER:-derrumbe_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-derrumbe_password}
    ports:
      - "3306:3306"
    volumes:
      - ./internal/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    container_name: derrumbe_api
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
      - ./radar_cache:/app/radar_cache

volumes:
  db_data:
