name: Manual Deploy to VPS

on:
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Build
        run: go build -v ./...
      - name: Run Tests
        run: go test -v ./...

  deploy:
    name: Deploy to Hostinger VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deployer
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # 1. Navigate to the deployer's home directory
            cd /home/deployer
            
            # 2. Update the backend repository inside its subdirectory
            git -C backend pull origin main
            
            # 3. Restart services using the modern command
            docker compose up -d --build
